<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>À nos lecteurs du dimanche - Inscription</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

/* PAGE */

body{

background-image:url("https://images.unsplash.com/photo-1507842217343-583bb7270b66");
background-size:cover;
background-position:center;

min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

padding:20px;

}

/* overlay */

body::before{

content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
z-index:0;

}

/* CONTAINER */

.container{

position:relative;
z-index:1;

width:100%;
max-width:800px;

height:1200px;

background:white;

border-radius:18px;

padding:35px 30px;

box-shadow:0 20px 40px rgba(0,0,0,0.35);

}

/* TITRE */

h1{

font-size:40px;
margin-bottom:8px;

display:flex;
align-items:center;
justify-content:center;

text-align:center;

gap:8px;

color:#5b3f2a;

}

p{

font-size:30px;
color:#777;
text-align:center;
margin-bottom:50px;
margin-left:20px;

}

/* INPUTS */

.input-group{

position:relative;

margin-bottom:23px;

}

.input-group i{

position:absolute;
left:20px;
right:20px;
top:50%;
transform:translateY(-50%);
color:#7b5b46;
font-size:30px;

}

input, textarea{

width:100%;

padding:18px 18px 18px 45px;

border-radius:10px;

border:1px solid #ddd;

font-size:25px;

}

textarea{

height:130px;
resize:none;

}

input:focus, textarea:focus{

border-color:#8b5e3c;
box-shadow:0 0 6px rgba(139,94,60,0.25);
outline:none;

}

/* GENRES */

.genre-group{

margin:30px 18px;

}

.genre-title{

font-weight:600;
font-size:30px;

margin-bottom:25px;

display:flex;
align-items:center;
gap:15px;

color:#5b3f2a;

}

/* TAGS GENRES */

.genres{

display:flex;
flex-wrap:wrap;
gap:18px;

}

/* cacher checkbox */

.genres input{

display:none;

}

/* TAG */

.genres span{

display:inline-block;

padding:12px 18px;

background:#f3f3f3;

border-radius:25px;

font-size:25px;

border:1px solid #ddd;

transition:0.25s;

}

/* sélection */

.genres input:checked + span{

background:#6b4f4f;
color:white;
border-color:#6b4f4f;

}

/* BOUTON */

button{

width:100%;

padding:16px;

border:none;

border-radius:12px;

background:#25D366;

color:white;

font-size:25px;
font-weight:600;

margin-top:10px;

}

button:active{

transform:scale(0.98);

}

/* scroll mobile plus fluide */

.container::-webkit-scrollbar{
display:none;
}

</style>

</head>

<body>

<div class="container">

<h1><i class="fa-solid fa-book-open"></i> À nos lecteurs du dimanche</h1>
<p>Inscription à notre Book Club d'Abidjan</p>

<form id="bookForm">

<div class="input-group">
<i class="fa-solid fa-user"></i>&nbsp;&nbsp;
<input type="text" id="nom" placeholder="Nom complet" required>
</div>

<div class="input-group">
<i class="fa-solid fa-phone"></i>&nbsp;&nbsp;
<input type="tel" id="phone" placeholder="Numéro WhatsApp" required>
</div>

<div class="input-group">
<i class="fa-solid fa-book"></i>&nbsp;&nbsp;
<input type="text" id="livre" placeholder="Livre préféré">
</div>

<div class="genre-group">

<label class="genre-title">
<i class="fa-solid fa-bookmark"></i> Types de lecture
</label>

<div class="genres">

<label><input type="checkbox" value="Aventure"><span>Aventure</span></label>
<label><input type="checkbox" value="Dark Romance"><span>Dark Romance</span></label>
<label><input type="checkbox" value="Fantasy"><span>Fantasy</span></label>
<label><input type="checkbox" value="Science Fiction"><span>Science Fiction</span></label>
<label><input type="checkbox" value="Thriller"><span>Thriller</span></label>
<label><input type="checkbox" value="Conte"><span>Conte</span></label>
<label><input type="checkbox" value="Conte africain"><span>Conte africain</span></label>
<label><input type="checkbox" value="Histoire africaine"><span>Histoire africaine</span></label>
<label><input type="checkbox" value="Littérature africaine"><span>Littérature africaine</span></label>
<label><input type="checkbox" value="Développement personnel"><span>Développement personnel</span></label>

</div>

</div>

<div class="input-group">
<i class="fa-solid fa-pen"></i>
<textarea id="motivation" placeholder="Pourquoi veux-tu rejoindre le club ?"></textarea>
</div>

<button type="submit">
<i class="fa-brands fa-whatsapp"></i> Envoyer l'inscription
</button>

</form>

</div>

<script>

document.getElementById("bookForm").addEventListener("submit", function(e){

e.preventDefault();

let nom = document.getElementById("nom").value;
let phone = document.getElementById("phone").value;
let livre = document.getElementById("livre").value;
let motivation = document.getElementById("motivation").value;

let genres = [];

document.querySelectorAll(".genres input:checked").forEach(function(g){
genres.push(g.value);
});

let genresText = genres.join(", ");

let message = `📚 Nouvelle inscription - À nos lecteurs du dimanche

Nom : ${nom}
WhatsApp : ${phone}
Livre préféré : ${livre}

Genres : ${genresText}

Motivation : ${motivation}`;

let url = "https://wa.me/225XXXXXXXX?text=" + encodeURIComponent(message);

window.open(url, "_blank");

});

</script>

</body>
</html>
